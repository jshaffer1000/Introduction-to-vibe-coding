<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Task Manager</title>\n</head>\n<body>\n    <header>\n        <h1>Task Manager</h1>\n    </header>\n    <main>\n        <section aria-labelledby="task-input">\n            <h2 id="task-input">Add a New Task</h2>\n            <form action="#" method="post">\n                <label for="task-name">Task Name:</label>\n                <input type="text" id="task-name" name="task-name" required aria-required="true">\n                <label for="task-description">Description:</label>\n                <textarea id="task-description" name="task-description" aria-required="true"></textarea>\n                <button type="submit">Add Task</button>\n            </form>\n        </section>\n        <section aria-labelledby="task-list">\n            <h2 id="task-list">Your Tasks</h2>\n            <ul id="tasks">\n                <!-- List tasks here -->\n            </ul>\n        </section>\n    </main>\n    <footer>\n        <p>&copy; 2026 Task Manager Application</p>\n    </footer>\n</body>\n</html>
